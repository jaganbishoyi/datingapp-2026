<div class="card bg-base-100 w-1/2 mx-auto p-10 mt-10 shadow-xl">
  <h3 class="text-3xl font-bold text-red-500 mb-6">{{title}}</h3>
  <ul class="list">
    <li *ngFor="let member of members; ngForTrackBy: trackByMemberId" class="list-row items-center mb-3">
      <img src="assets/user.png" alt="User avatar" srcset="" class="size-12 rounded-box">
      <div class="inline-block">
        {{member.displayName}}
      </div>
    </li>
  </ul>
</div>
